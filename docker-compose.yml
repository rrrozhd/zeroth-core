services:
  zeroth:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ZEROTH_DATABASE__BACKEND: postgres
      ZEROTH_DATABASE__POSTGRES_DSN: "postgresql://zeroth:zeroth@postgres:5432/zeroth"
      ZEROTH_REDIS__HOST: redis
      ZEROTH_REDIS__PORT: "6379"
      ZEROTH_REGULUS__ENABLED: "true"
      ZEROTH_REGULUS__BASE_URL: "http://regulus:8080/v1"
      ZEROTH_SANDBOX__BACKEND: sidecar
      ZEROTH_SANDBOX__SIDECAR_URL: "http://sandbox-sidecar:8001"
      ZEROTH_DISPATCH__ARQ_ENABLED: "true"
      ZEROTH_DEPLOYMENT_REF: "default"
    networks:
      - zeroth-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zeroth
      POSTGRES_PASSWORD: zeroth
      POSTGRES_DB: zeroth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zeroth"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - zeroth-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - zeroth-net

  regulus:
    image: regulus-backend:latest
    environment:
      REGULUS_PORT: "8080"
    networks:
      - zeroth-net

  sandbox-sidecar:
    image: zeroth-sandbox-sidecar:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - zeroth-net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - zeroth
    networks:
      - zeroth-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  zeroth-net:
    driver: bridge
