[project]
name = "zeroth"
version = "0.1.0"
description = "Governed medium-code platform for production-grade multi-agent systems"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "governai @ file:///Users/dondoe/coding/governai",
    "fastapi>=0.115",
    "httpx>=0.27",
    "PyJWT[crypto]>=2.10",
    "pydantic>=2.10",
    "redis>=5.0.0",
    "uvicorn>=0.30",
    "pgvector>=0.4.2",
    "litellm>=1.83.0",
    "psycopg[binary]>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zeroth"]

[tool.hatch.metadata]
allow-direct-references = true

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.25",
    "ruff>=0.11",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM"]
