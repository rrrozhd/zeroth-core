name: docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        # --all-extras: the OpenAPI drift check imports zeroth.core.service.app,
        # which transitively requires the `dispatch` extra (redis). Installing
        # all extras is the simplest way to keep the drift gate honest in CI.
        run: uv sync --all-extras

      - name: Check Configuration reference is up to date
        run: |
          cp docs/reference/configuration.md /tmp/committed-config.md
          uv run python scripts/dump_config.py --out /tmp/fresh-config.md
          diff -u /tmp/committed-config.md /tmp/fresh-config.md

      - name: Generate OpenAPI asset for docs site
        run: |
          mkdir -p docs/assets/openapi
          uv run python scripts/dump_openapi.py --out docs/assets/openapi/zeroth-core-openapi.json

      - name: Build site (strict)
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
