name: examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-examples:
    runs-on: ubuntu-latest
    env:
      # Scripts SKIP cleanly when this is unset, so forked-PR runs without
      # access to repo secrets still exit 0.
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run examples/hello.py
        run: uv run python examples/hello.py

      - name: Run examples/first_graph.py
        run: uv run python examples/first_graph.py

      - name: Run examples/approval_demo.py
        run: uv run python examples/approval_demo.py

      - name: Run examples/governance_walkthrough.py (if present)
        run: |
          if [ -f examples/governance_walkthrough.py ]; then
            uv run python examples/governance_walkthrough.py
          else
            echo "examples/governance_walkthrough.py not yet shipped (Plan 30-04); skipping."
          fi

      - name: Run examples/approval_step.py
        run: uv run python examples/approval_step.py

      - name: Run examples/attach_memory.py
        run: uv run python examples/attach_memory.py

      - name: Run examples/budget_cap.py
        run: uv run python examples/budget_cap.py

      - name: Run examples/sandbox_tool.py
        run: uv run python examples/sandbox_tool.py

      - name: Run examples/webhook_retry.py
        run: uv run python examples/webhook_retry.py

      - name: Run examples/policy_block.py
        run: uv run python examples/policy_block.py

      - name: Run examples/audit_query.py
        run: uv run python examples/audit_query.py

      - name: Run examples/agent_handoff.py
        run: uv run python examples/agent_handoff.py

      - name: Run examples/condition_branch.py
        run: uv run python examples/condition_branch.py

      - name: Run examples/secret_injection.py
        run: uv run python examples/secret_injection.py
